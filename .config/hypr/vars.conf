$terminal = ~/.local/bin/apps/terminal.sh
$fileManager = ~/.local/bin/apps/fileexplorer.sh
$browser = ~/.local/bin/apps/browser.sh
$menu = ~/.local/bin/apps/launcher.sh

$xdg_config = /home/$USER/.config
$xdg_cache = /home/$USER/.cache
$xdg_data = /home/$USER/.local/share
$xdg_state = /home/$USER/.local/state

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Ice

env = AQ_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland

env = CARGO_HOME,$xdg_data/cargo
env = CUDA_CACHE_PATH,$xdg_cache/nv 
env = GRADLE_USER_HOME,$xdg_data/gradle
env = GOPATH,$xdg_data/go
env = _JAVA_OPTIONS,-Djava.util.prefs.userRoot=$xdg_config/java
env = MAVEN_OPTS,-Dmaven.repo.local=$xdg_data/maven/repository
env = NVM_DIR,$xdg_data/nvm
env = NPM_CONFIG_USERCONFIG,$xdg_config/npm/npmrc
env = PARALLEL_HOME,$xdg_config/parallel
env = PYTHON_HISTORY,$xdg_state/python/history
env = PYTHONPYCACHEPREFIX,$xdg_cache/python
env = PYTHONUSERBASE,$xdg_data/python
env = RIPGREP_CONFIG_PATH,$xdg_config/ripgrep/config
env = RUSTUP_HOME,$xdg_data/rustup
env = TEXMFHOME,$xdg_data/texmf
env = TEXMFVAR,$xdg_cache/texlive/texmf-var
env = TEXMFCONFIG,$xdg_config/texlive/texmf-config
env = WGETRC,$xdg_config/wget/wgetrc
env = XDG_DATA_HOME,$xdg_data
env = XDG_CACHE_HOME,$xdg_cache
env = XDG_CONFIG_HOME,$xdg_config
env = XDG_STATE_HOME,$xdg_state
env = ZDOTDIR,$xdg_config/zsh
